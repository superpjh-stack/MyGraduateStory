steps:
  # Build the Docker image (pass Supabase vars as build-args from Secret Manager)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=$$SUPABASE_URL \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY \
          --tag us-central1-docker.pkg.dev/$PROJECT_ID/mygraduate/app:$COMMIT_SHA \
          --tag us-central1-docker.pkg.dev/$PROJECT_ID/mygraduate/app:latest \
          .
    secretEnv:
      - SUPABASE_URL
      - SUPABASE_ANON_KEY

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mygraduate/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mygraduate'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mygraduate/app:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-secrets'
      - 'NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=NEXT_PUBLIC_SUPABASE_ANON_KEY:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest
      env: SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: SUPABASE_ANON_KEY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mygraduate/app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mygraduate/app:latest'

options:
  logging: LEGACY
  machineType: 'E2_HIGHCPU_8'
